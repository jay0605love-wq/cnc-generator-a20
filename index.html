<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CNC Generator A20 V0.6</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:15px;
}

.box{
background:#222;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select,button,textarea{
width:100%;
padding:12px;
margin:5px 0;
font-size:16px;
border-radius:8px;
}

button{
background:#008cff;
color:white;
border:0;
}

textarea{
height:250px;
background:#000;
color:#00ff00;
}

</style>

</head>


<body>

<h2>⚙️ CNC Generator A20 V0.6</h2>


<div class="box">

<select id="mode">

<option value="od">
OD Turning
</option>

<option value="g32">
G32 Manual Thread
</option>

<option value="g92">
G92 Thread Cycle
</option>

<option value="g83">
G83 Drill
</option>

<option value="g84">
G84 Tap
</option>

<option value="cut">
Cut Off
</option>

<option value="groove">
Groove
</option>

<option value="chamfer">
Chamfer
</option>

<option value="radius">
Radius G02/G03
</option>

<option value="offset">
Tool Offset Calculator
</option>

</select>

</div>



<div class="box">

<h3>Common</h3>

<label>RPM</label>
<input id="rpm" value="3000">

<label>Feed</label>
<input id="feed" value="0.05">


<h3>OD Turning</h3>

<label>X Start Diameter</label>
<input id="xs" value="8">

<label>X Finish Diameter</label>
<input id="xe" value="6">

<label>Z Length</label>
<input id="zl" value="-20">


<h3>Thread</h3>

<label>Pitch</label>
<input id="pitch" value="0.8">

<label>X Start</label>
<input id="txs" value="4.5">

<label>X Finish</label>
<input id="txe" value="3.9">

<label>Z Thread</label>
<input id="tz" value="-10">

<label>Pass</label>
<input id="pass" value="4">
<h3>G83 Drill</h3>

<label>Drill Depth Z</label>
<input id="drillZ" value="-10">

<label>Peck Q</label>
<input id="peck" value="2">


<h3>G84 Tap</h3>

<label>Tap Pitch</label>
<input id="tapPitch" value="0.8">

<label>Tap Depth Z</label>
<input id="tapZ" value="-10">

<label>R Point</label>
<input id="tapR" value="1">


<h3>Cut Off</h3>

<label>Cut X</label>
<input id="cutX" value="-1">

<label>Cut Z</label>
<input id="cutZ" value="-2">


<h3>Groove</h3>

<label>Groove X</label>
<input id="grooveX" value="5">

<label>Groove Z</label>
<input id="grooveZ" value="-2">


<h3>Chamfer</h3>

<label>Chamfer C</label>
<input id="chamferC" value="1">


<h3>Radius</h3>

<label>Radius R</label>
<input id="radiusR" value="2">

<label>Direction</label>

<select id="radiusDir">

<option value="G02">
G02
</option>

<option value="G03">
G03
</option>

</select>



<h3>Tool Offset Calculator</h3>

<label>Tool No.</label>
<input id="toolNo" value="1">

<label>Geometry</label>
<input id="geometry" value="0">

<label>Wear</label>
<input id="wear" value="0">


<button onclick="generate()">
Generate G-code
</button>


<button onclick="copyCode()">
Copy G-code
</button>


</div>


<textarea id="out"></textarea>


<script>


function generate(){

let mode=document.getElementById("mode").value;

let code=
"%\nO1006\nG99\nG97 S"+
rpm.value+
" M3\n";
   if(mode=="od"){

code+=
"G0 X"+xs.value+" Z1.\n"+
"G1 Z0 F"+feed.value+"\n"+
"X"+xe.value+"\n"+
"Z"+zl.value+"\n";

}


if(mode=="g32"){

let start=parseFloat(txs.value);
let end=parseFloat(txe.value);
let p=parseInt(pass.value);
let step=(start-end)/p;

for(let i=0;i<=p;i++){

let x=(start-(step*i)).toFixed(2);

code+=
"G32 X"+x+
" Z"+tz.value+
" F"+pitch.value+
"\n";

}

}


if(mode=="g92"){

code+=
"G92 X"+txs.value+
" Z"+tz.value+
" F"+pitch.value+
"\nX"+txe.value+"\n";

}


if(mode=="g83"){

code+=
"G83 Z"+drillZ.value+
" Q"+peck.value+
" F"+feed.value+
"\nG80\n";

}


if(mode=="g84"){

code+=
"G84 Z"+tapZ.value+
" R"+tapR.value+
" F"+tapPitch.value+
"\nG80\n";

}


if(mode=="cut"){

code+=
"G1 X"+cutX.value+
" Z"+cutZ.value+
" F"+feed.value+
"\n";

}


if(mode=="groove"){

code+=
"G1 X"+grooveX.value+
" F"+feed.value+
"\nZ"+grooveZ.value+
"\n";

}


if(mode=="chamfer"){

code+=
"G1 X"+chamferC.value+
" Z-"+chamferC.value+
" F"+feed.value+
"\n";

}


if(mode=="radius"){

code+=
radiusDir.value+
" X10. Z-5. R"+
radiusR.value+
"\n";

}


if(mode=="offset"){

code+=
"( TOOL OFFSET )\n"+
"TOOL NO : "+
toolNo.value+
"\nGEOMETRY : "+
geometry.value+
"\nWEAR : "+
wear.value+
"\n";

}


code+=
"G0 X20.\n"+
"M5\n"+
"M30\n%";


out.value=code;

}



function copyCode(){

out.select();

document.execCommand("copy");

alert("Copy G-code แล้ว");

}


</script>


</body>
</html>
